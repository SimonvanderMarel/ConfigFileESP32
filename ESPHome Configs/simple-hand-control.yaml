substitutions:
  name: "hapcba-serverrack"
  friendly_name: "HAPCBA serverrack"

# iiyama-prolite-tf2234mc
# modelno plc2234
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: dev

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "qDX/Hr7y87kaj2i0+EUnA0AjaSpHzJVSkcwm2WWBi6I="

ota:
  platform: esphome
  password: "00089e9b44456a6937ee245601c98f6f"


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2 
  fast_connect: on
  # Optional manual IP
  #manual_ip: 
  #  static_ip: 192.168.1.120  
  #  gateway: 192.168.1.1
  #  subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${name}
    password: "fallbackpw"

captive_portal:

dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-web/esp32.yaml@main
  import_full_config: true

# To have a "next url" for improv serial
web_server:

globals:
  - id: fan_speed
    type: float
    restore_value: true
    initial_value: '100.0'

  - id: attached_fans
    type: int
    restore_value: true
    initial_value: '0'

script:
  - id: set_fan_speed
    mode: single
    then:
      - lambda: |-
          id(ventilation_fan_pwm).set_level(id(fan_speed) / 100.0);

# GPIO8 & GPIO9 for ESP32-C3 supermini, both strapping pins
i2c:
  sda: GPIO21
  scl: GPIO22 # D5
  scan: true
  id: bus_a

one_wire:
  - platform: gpio
    id: DS18B20_pin1
    pin: GPIO32

  - platform: gpio
    id: DS18B20_pin2
    pin: GPIO33

sensor:
  - platform: sht4x
    temperature:
      name: "Temperature"
      id: sht40_temp
      accuracy_decimals: 1
      filters:
      - filter_out: 0.0
      - median:
          window_size: 3
          send_every: 3
          send_first_at: 1
    humidity:
      name: "Relative Humidity"
      id: sht40_humidity
      accuracy_decimals: 1
      filters:
      - filter_out: 0.0
      - median:
          window_size: 3
          send_every: 3
          send_first_at: 1
  
  - platform: veml7700
    address: 0x10
    update_interval: 60s
    # short variant of sensor definition:
    ambient_light: 
      name: "Ambient light"
      filters:
      - calibrate_linear:
          method: least_squares
          datapoints:
          # Map 0.0 (from sensor) to 1.0 (true value)
            - 0.0 -> 0.0
            - 3.0 -> 5.0
            - 40.0 -> 120
    # longer variant of sensor definition:
    actual_gain:
      name: "Actual gain"

  - platform: dallas_temp
    id: DS18B20_1
    one_wire_id: DS18B20_pin1
    name: "DS18B20 Temperature 1"
    update_interval: 60s

  - platform: dallas_temp
    id: DS18B20_2
    one_wire_id: DS18B20_pin2
    name: "DS18B20 Temperature 2"
    update_interval: 60s

  - platform: bmp280_i2c
    address: 0x77
    update_interval: 60s
    temperature:
      name: "BMP temp"
      id: bmp20_temp
      oversampling: 2x
      accuracy_decimals: 2
      disabled_by_default: true
      state_class: measurement
    pressure:
      name: "BMP Pressure"
      id: bmp20_pressure
      accuracy_decimals: 2
      disabled_by_default: false
      state_class: measurement

  - platform: aht10
    address: 0x38
    update_interval: 60s
    temperature:
      name: "AHT20 temp"
      id: aht20_temp
      accuracy_decimals: 2
      filters:
      - filter_out: 0.0
      - median:
          window_size: 3
          send_every: 3
          send_first_at: 1
      disabled_by_default: true
      state_class: measurement
    humidity:
      name: "AHT20 humidity"
      id: aht20_humidity
      accuracy_decimals: 2
      filters:
      - filter_out: 0.0
      - median:
          window_size: 3
          send_every: 3
          send_first_at: 1
      disabled_by_default: true
      state_class: measurement

  - platform: uptime
    type: seconds
    name: Uptime Sensor

  - platform: combination
    type: max
    name: "Max Device Temperature"
    id: max_temp
    accuracy_decimals: 2
    filters:
         - exponential_moving_average:  
             alpha: 0.1
             send_every: 1
    sources:
      - source: sht40_temp
      - source: DS18B20_1
      - source: DS18B20_2

  - platform: combination
    type: median
    name: "Median Air Temperature"
    id: med_temp
    accuracy_decimals: 2
    filters:
         - exponential_moving_average:  
             alpha: 0.1
             send_every: 1
    sources:
      - source: bmp20_temp
      - source: aht20_temp
      - source: sht40_temp
      - source: sht40_temp

  - platform: combination
    type: median
    name: "Median Humidity"
    id: med_humidty
    accuracy_decimals: 2
    filters:
         - exponential_moving_average:  
             alpha: 0.1
             send_every: 1
    sources:
      - source: aht20_humidity
      - source: sht40_humidity

  - platform: pulse_counter
    name: "Fan 1 RPM"
    id: "fan1_rpm"
    unit_of_measurement: 'RPM'
    pin:
      number: GPIO25
      inverted: false
      mode: INPUT_PULLUP        # Pull-up is required for fan tach readings
    count_mode:
      rising_edge: INCREMENT    # Count only the rising edge of each tick
      falling_edge: DISABLE     # Falling edges might result in lingering values
    use_pcnt: true              # Use the hardware pulse counter explicitly
    update_interval: 60s
    filters:
      - multiply: 0.5           # Most fans provide 2 pulses per rotation

  - platform: pulse_counter
    name: "Fan 2 RPM"
    id: "fan2_rpm"
    unit_of_measurement: 'RPM'
    pin:
      number: GPIO26
      inverted: false
      mode: INPUT_PULLUP
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    use_pcnt: true
    update_interval: 60s
    filters:
      - multiply: 0.5

  - platform: pulse_counter
    name: "Fan 3 RPM"
    id: "fan3_rpm"
    unit_of_measurement: 'RPM'
    pin:
      number: GPIO27
      inverted: false
      mode: INPUT_PULLUP
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    use_pcnt: true
    update_interval: 60s
    filters:
      - multiply: 0.5


binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO15
      mode:
        input: true
        #pulldown: true
    name: "Button 1"
    id: bin_btn1
    filters:
      - delayed_off: 1000ms

  - platform: gpio
    pin: 
      number: GPIO23
      mode:
        input: true
        #pulldown: true
    name: "Button 2"
    id: bin_btn2
    filters:
      - delayed_off: 1000ms

  - platform: gpio
    pin: 
      number: GPIO34
      mode:
        input: true
        #pulldown: true
    name: "PIR Sensor"
    device_class: motion
    filters:
      - delayed_off: 60000ms


output:
  - platform: ledc
    pin: GPIO4

     # 25KHz is standard PWM PC fan frequency, minimises buzzing
    frequency: "25000 Hz"
    id: ventilation_fan_pwm

    min_power: 0%
    max_power: 100%

  - platform: ledc
    pin: GPIO18
    frequency: "10000 Hz"
    id: power_output

  - platform: ledc
    pin: GPIO19
    frequency: "5000 Hz"
    id: LEDstrip_pwm

fan:
  - platform: speed
    output: ventilation_fan_pwm
    name: "Ventilation Fan"


light:
  - platform: monochromatic
    output: power_output
    name: "Reserve power output"

  - platform: monochromatic
    output: LEDstrip_pwm
    name: "LED strip"